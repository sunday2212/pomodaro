<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Red Progress Bar Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f0f;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .player-wrapper {
            width: 100%;
            max-width: 960px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
        }

        /* Video container keeps aspect ratio */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
        }

        /* Custom progress bar overlay */
        .progress-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
            display: flex;
            align-items: center;
            padding: 0 16px 8px 16px;
            z-index: 2;
            gap: 12px;
        }

        /* The progress bar track */
        .progress-track {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 4px;
            position: relative;
            cursor: pointer;
            transition: height 0.15s;
        }

        .progress-track:hover {
            height: 6px;
        }

        /* Buffered portion */
        .buffered {
            height: 100%;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 4px;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        /* Filled red portion */
        .filled {
            height: 100%;
            background: #ff0000;
            border-radius: 4px;
            width: 0%;
            position: relative;
            transition: width 0.05s linear;
        }

        /* Red scrubber dot */
        .filled::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #ff0000;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.15s ease;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.6);
        }

        .progress-track:hover .filled::after {
            opacity: 1;
        }

        /* Time display */
        .time-display {
            color: #fff;
            font-size: 13px;
            font-weight: 400;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.3px;
        }

        /* Play/Pause button */
        .ctrl-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .ctrl-btn svg {
            width: 22px;
            height: 22px;
            fill: #fff;
        }

        /* Fullscreen button */
        .fullscreen-btn {
            margin-left: auto;
        }

        .fullscreen-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Volume slider (minimal) */
        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .volume-wrap input[type="range"] {
            width: 60px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 4px;
            outline: none;
        }

        .volume-wrap input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: #ff0000;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .volume-wrap input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            background: #ff0000;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .progress-overlay {
                padding: 0 10px 6px 10px;
                height: 42px;
            }
            .ctrl-btn {
                width: 28px;
                height: 28px;
            }
            .ctrl-btn svg {
                width: 18px;
                height: 18px;
            }
            .time-display {
                font-size: 11px;
            }
            .volume-wrap input[type="range"] {
                width: 40px;
            }
            .filled::after {
                width: 10px;
                height: 10px;
                right: -5px;
            }
        }
    </style>
</head>
<body>

    <div class="player-wrapper">
        <div class="video-container">
            <!-- Video element -->
            <video id="video" preload="metadata" playsinline>
                <source src="https://stream.mux.com/BV3YZtogl89mg9VcNBhhnHm02Y34zI1nlMuMQfAbl3dM/highest.mp4" type="video/mp4" />
                Your browser does not support the video tag.
            </video>

            <!-- Custom progress bar overlay -->
            <div class="progress-overlay">
                <!-- Play/Pause -->
                <button class="ctrl-btn" id="playBtn" aria-label="Play/Pause">
                    <svg viewBox="0 0 24 24">
                        <polygon points="5,3 19,12 5,21" />
                    </svg>
                </button>

                <!-- Time -->
                <span class="time-display" id="timeDisplay">0:00 / 0:00</span>

                <!-- Progress bar -->
                <div class="progress-track" id="progressTrack">
                    <div class="buffered" id="bufferedBar"></div>
                    <div class="filled" id="filledBar"></div>
                </div>

                <!-- Volume -->
                <div class="volume-wrap">
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" />
                </div>

                <!-- Fullscreen -->
                <button class="ctrl-btn fullscreen-btn" id="fullscreenBtn" aria-label="Fullscreen">
                    <svg viewBox="0 0 24 24">
                        <path d="M7,14H5v5h5v-2H7V14z M5,10h2V7h3V5H5V10z M17,17h-3v2h5v-5h-2V17z M14,5v2h3v3h2V5H14z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const video = document.getElementById('video');
            const playBtn = document.getElementById('playBtn');
            const timeDisplay = document.getElementById('timeDisplay');
            const progressTrack = document.getElementById('progressTrack');
            const filledBar = document.getElementById('filledBar');
            const bufferedBar = document.getElementById('bufferedBar');
            const volumeSlider = document.getElementById('volumeSlider');
            const fullscreenBtn = document.getElementById('fullscreenBtn');

            let isDragging = false;
            let wasPlayingBeforeDrag = false;

            // ── Format time ──
            function formatTime(seconds) {
                if (!seconds || isNaN(seconds)) return '0:00';
                const s = Math.floor(seconds);
                const m = Math.floor(s / 60);
                const secs = s % 60;
                return m + ':' + (secs < 10 ? '0' : '') + secs;
            }

            // ── Update progress ──
            function updateProgress() {
                if (video.duration) {
                    const percent = (video.currentTime / video.duration) * 100;
                    filledBar.style.width = percent + '%';
                    timeDisplay.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
                }
            }

            // ── Update buffered ──
            function updateBuffered() {
                if (video.buffered.length > 0) {
                    const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                    const percent = (bufferedEnd / video.duration) * 100;
                    bufferedBar.style.width = percent + '%';
                }
            }

            // ── Play/Pause toggle ──
            function togglePlay() {
                if (video.paused) {
                    video.play();
                } else {
                    video.pause();
                }
            }

            // ── Update play button icon ──
            function updatePlayIcon() {
                const svg = playBtn.querySelector('svg');
                if (video.paused) {
                    svg.innerHTML = '<polygon points="5,3 19,12 5,21" />';
                } else {
                    svg.innerHTML = '<rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" />';
                }
            }

            // ── Event listeners ──
            playBtn.addEventListener('click', togglePlay);
            video.addEventListener('click', togglePlay);

            video.addEventListener('play', updatePlayIcon);
            video.addEventListener('pause', updatePlayIcon);

            video.addEventListener('timeupdate', () => {
                updateProgress();
                updateBuffered();
            });

            video.addEventListener('loadedmetadata', () => {
                updateProgress();
                updateBuffered();
                timeDisplay.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
            });

            video.addEventListener('progress', updateBuffered);

            // ── Progress bar seeking (mouse) ──
            progressTrack.addEventListener('mousedown', (e) => {
                isDragging = true;
                wasPlayingBeforeDrag = !video.paused;
                video.pause();
                const rect = progressTrack.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;
                video.currentTime = x * video.duration;
                updateProgress();
            });

            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const rect = progressTrack.getBoundingClientRect();
                    let x = (e.clientX - rect.left) / rect.width;
                    x = Math.max(0, Math.min(1, x));
                    video.currentTime = x * video.duration;
                    updateProgress();
                }
            });

            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    if (wasPlayingBeforeDrag) {
                        video.play();
                    }
                }
            });

            // ── Progress bar seeking (touch) ──
            progressTrack.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isDragging = true;
                wasPlayingBeforeDrag = !video.paused;
                video.pause();
                const rect = progressTrack.getBoundingClientRect();
                const touch = e.touches[0];
                const x = (touch.clientX - rect.left) / rect.width;
                video.currentTime = x * video.duration;
                updateProgress();
            }, { passive: false });

            progressTrack.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (isDragging) {
                    const rect = progressTrack.getBoundingClientRect();
                    const touch = e.touches[0];
                    let x = (touch.clientX - rect.left) / rect.width;
                    x = Math.max(0, Math.min(1, x));
                    video.currentTime = x * video.duration;
                    updateProgress();
                }
            }, { passive: false });

            progressTrack.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (isDragging) {
                    isDragging = false;
                    if (wasPlayingBeforeDrag) {
                        video.play();
                    }
                }
            }, { passive: false });

            // ── Volume ──
            volumeSlider.addEventListener('input', () => {
                video.volume = parseFloat(volumeSlider.value);
            });

            // ── Fullscreen ──
            fullscreenBtn.addEventListener('click', () => {
                const container = document.querySelector('.player-wrapper');
                if (!document.fullscreenElement) {
                    container.requestFullscreen?.() || container.webkitRequestFullscreen?.() || container
                        .msRequestFullscreen?.();
                } else {
                    document.exitFullscreen?.() || document.webkitExitFullscreen?.() || document.msExitFullscreen?.();
                }
            });

            // Update fullscreen icon
            document.addEventListener('fullscreenchange', updateFullscreenIcon);
            document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);
            document.addEventListener('msfullscreenchange', updateFullscreenIcon);

            function updateFullscreenIcon() {
                const isFull = !!document.fullscreenElement || !!document.webkitFullscreenElement || !!document
                    .msFullscreenElement;
                const svg = fullscreenBtn.querySelector('svg');
                if (isFull) {
                    svg.innerHTML =
                        '<path d="M5,16h3v3h2v-5H5V16z M8,8H5v2h5V5H8V8z M16,19h2v-3h3v-2h-5V19z M19,8h-2V5h-2v5h4V8z" />';
                } else {
                    svg.innerHTML =
                        '<path d="M7,14H5v5h5v-2H7V14z M5,10h2V7h3V5H5V10z M17,17h-3v2h5v-5h-2V17z M14,5v2h3v3h2V5H14z" />';
                }
            }

            // ── Keyboard shortcuts (space, arrows) ──
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;
                switch (e.key) {
                    case ' ':
                    case 'k':
                        e.preventDefault();
                        togglePlay();
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        video.currentTime = Math.min(video.currentTime + 5, video.duration);
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        video.currentTime = Math.max(video.currentTime - 5, 0);
                        break;
                    case 'f':
                        fullscreenBtn.click();
                        break;
                }
            });

            // ── Init ──
            updatePlayIcon();
            updateProgress();
        })();
    </script>

</body>
</html>
