<!DOCTYPE html>
<html lang="en">
<head>
<style>
  .video-container { width: 640px; position: relative; }
  video { width: 100%; display: block; }
  
  /* Custom Controls Bar */
  .controls { display: flex; align-items: center; padding: 10px; background: #000; color: #fff; }
  
  /* Progress Bar Styling */
  input[type=range] {
    flex-grow: 1;
    margin: 0 10px;
    cursor: pointer;
    background: transparent;
    appearance: none;
  }

  /* The "Orange" Progress (Chrome/Safari) */
  input[type=range]::-webkit-slider-runnable-track {
    background: #555; /* Unplayed part */
    height: 4px;
  }
  
  /* The "Dot" (Thumb) */
  input[type=range]::-webkit-slider-thumb {
    appearance: none;
    height: 14px;
    width: 14px;
    background: orange; /* Your requested color */
    border-radius: 50%;
    margin-top: -5px;
  }
</style>
</head>
<body>

<div class="video-container">
  <video id="myVideo">
    <source src="https://stream.mux.com/BV3YZtogl89mg9VcNBhhnHm02Y34zI1nlMuMQfAbl3dM/highest.mp4" type="video/mp4">
  </video>
  
  <div class="controls">
    <button id="playBtn">Play</button>
    <input type="range" id="progressBar" value="0" max="100">
  </div>
</div>

<script>
  const video = document.getElementById('myVideo');
  const progressBar = document.getElementById('progressBar');
  const playBtn = document.getElementById('playBtn');

  playBtn.addEventListener('click', () => {
    video.paused ? video.play() : video.pause();
    playBtn.textContent = video.paused ? 'Play' : 'Pause';
  });

  video.addEventListener('timeupdate', () => {
    const value = (video.currentTime / video.duration) * 100;
    progressBar.value = value;
  });

  progressBar.addEventListener('input', (e) => {
    video.currentTime = (e.target.value / 100) * video.duration;
  });
</script>

</body>
</html>
