<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OPD Mastery | NEXTPULSE</title>
    
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary: #2c5282; 
            --secondary: #ffffff;
            --bg-dark: #1a202c;
            --accent: #4fd1c7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: var(--secondary);
        }

        /* --- Row 1: Brand Header --- */
        .header-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: var(--primary);
            z-index: 1000;
        }

        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-box i { font-size: 1.6rem; color: var(--accent); }
        .logo-box h1 { font-size: 1.2rem; font-weight: 800; color: white; letter-spacing: 1px; }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 6px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- Row 2: Navigation Toolbar --- */
        .toolbar {
            background: #2d3748;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 999;
        }

        .tool-link {
            color: #cbd5e0;
            text-align: center;
            cursor: pointer;
            font-size: 11px;
            text-decoration: none;
            transition: 0.2s;
            flex: 1;
        }
        .tool-link i { display: block; font-size: 16px; margin-bottom: 3px; }
        .tool-link:hover { color: white; }

        /* --- Viewer Area --- */
        #app-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            background: radial-gradient(circle, #2d3748 0%, #1a202c 100%);
        }

        #book-container {
            visibility: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }

        .page { background-color: white; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }

        /* --- Side Panels --- */
        .panel {
            position: fixed;
            top: 0;
            left: -350px;
            width: 320px;
            height: 100%;
            background: var(--secondary);
            color: #333;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            box-shadow: 15px 0 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }
        .panel.active { left: 0; }
        .panel-header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .panel-content { flex: 1; overflow-y: auto; }

        .search-box { width: 90%; margin: 15px auto; padding: 12px; border-radius: 8px; border: 2px solid #edf2f7; display: block; outline: none; }
        .list-item { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .list-item:hover { background: #f8fafc; color: var(--primary); font-weight: 600; }
        .list-item span { color: #a0aec0; font-size: 10px; }

        /* --- Footer --- */
        footer {
            background: #1e293b;
            padding: 10px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            z-index: 1000;
        }

        .p-btn {
            background: var(--primary);
            border: none;
            color: white;
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Fullscreen Fix */
        #app-content:fullscreen { padding: 0; background: black; }

        #loading-overlay {
            position: fixed; inset: 0; background: #0f172a;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000;
        }
        .spinner { width: 45px; height: 45px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 500px) {
            .logo-box h1 { font-size: 1rem; }
            .header-main { padding: 10px; }
            #app-content { padding: 5px; }
            .viewer-area { padding: 5px; }
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top:15px; font-weight:600;">Loading Medical Notebook...</p>
        <small id="load-progress" style="color: var(--accent);">0%</small>
    </div>

    <!-- Row 1 -->
    <header class="header-main">
        <div class="logo-box">
            <i class="fas fa-heartbeat"></i>
            <h1>NEXTPULSE</h1>
        </div>
        <a href="javascript:history.back()" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </header>

    <!-- Row 2 -->
    <nav class="toolbar">
        <div class="tool-link" onclick="togglePanel('indexPanel')"><i class="fas fa-list"></i>Index</div>
        <div class="tool-link" onclick="togglePanel('searchPanel')"><i class="fas fa-search"></i>Search</div>
        <div class="tool-link" onclick="toggleFullscreen()"><i class="fas fa-expand"></i>Fullscreen</div>
        <div class="tool-link" id="btnSound"><i class="fas fa-volume-up"></i>Audio</div>
    </nav>

    <!-- Book Viewer -->
    <div id="app-content">
        <div id="book-container"></div>
    </div>

    <div id="indexPanel" class="panel">
        <div class="panel-header"><h3>Full Index</h3><i class="fas fa-times" onclick="closePanels()" style="cursor:pointer"></i></div>
        <div class="panel-content" id="fullIndexList"></div>
    </div>

    <div id="searchPanel" class="panel">
        <div class="panel-header"><h3>Search Case</h3><i class="fas fa-times" onclick="closePanels()" style="cursor:pointer"></i></div>
        <input type="text" class="search-box" id="searchInput" placeholder="Search diagnosis...">
        <div class="panel-content" id="searchResults"></div>
    </div>

    <footer>
        <button class="p-btn" onclick="pageFlip.flipPrev()"><i class="fas fa-chevron-left"></i></button>
        <div style="font-weight: 600; width: 100px; text-align: center;">
            <span id="pageCurrent" style="color: var(--accent);">1</span> / 52
        </div>
        <button class="p-btn" onclick="pageFlip.flipNext()"><i class="fas fa-chevron-right"></i></button>
    </footer>

    <script>
        const PDF_URL = 'https://cdnc.heyzine.com/files/uploaded/2f525ee1fda444bde96c5ba29e86b8d86fe889a9.pdf';
        const flipSound = new Audio('https://www.soundjay.com/print/sounds/page-flip-01a.mp3');
        
        let pdfDoc = null;
        let pageFlip = null;
        let isSoundEnabled = true;

        const caseData = [
            { t: "NON-PRODUCTIVE (DRY) COUGH", p: 3 }, { t: "ACIDITY / EPIGASTRIC PAIN", p: 4 },
            { t: "COUGH (PRODUCTIVE)", p: 5 }, { t: "HEADACHE (RECURRENT)", p: 6 },
            { t: "NEUROPATHIC PAIN", p: 7 }, { t: "BLOATING / GAS / FULLNESS", p: 8 },
            { t: "HIGH BLOOD PRESSURE", p: 9 }, { t: "BED WETTING IN TEENS", p: 10 },
            { t: "HAIR FALL (Diffuse / Gradual)", p: 11 }, { t: "ERECTILE DYSFUNCTION", p: 12 },
            { t: "LOW SPERM COUNT", p: 13 }, { t: "PREMATURE EJACULATION", p: 14 },
            { t: "URINARY TRACT INFECTION", p: 15 }, { t: "FILARIASIS (Acute Attack)", p: 16 },
            { t: "DENGUE FEVER", p: 17 }, { t: "TYPHOID FEVER", p: 18 },
            { t: "MALARIA", p: 19 }, { t: "DIABETES MELLITUS (Type 2)", p: 20 },
            { t: "ACUTE SINUSITIS", p: 21 }, { t: "COPD (Chronic Obstructive)", p: 22 },
            { t: "DYSPEPSIA", p: 23 }, { t: "BELL'S PALSY", p: 24 },
            { t: "ARTHRITIS", p: 25 }, { t: "SCIATICA PAIN", p: 26 },
            { t: "BODY ACHE (MYALGIA)", p: 27 }, { t: "OBESITY", p: 28 },
            { t: "IRRITABLE BOWEL SYNDROME", p: 29 }, { t: "CONSTIPATION", p: 30 },
            { t: "ACUTE DIARRHOEA", p: 31 }, { t: "DYSLIPIDEMIA", p: 32 },
            { t: "KNEE PAIN", p: 33 }, { t: "WORM INFESTATION", p: 34 },
            { t: "VERTIGO", p: 35 }, { t: "NUMBNESS IN ARMS & LEGS", p: 36 },
            { t: "WHITE DISCHARGE (Vaginal)", p: 37 }, { t: "PCOD — OBS & GYNAE", p: 38 },
            { t: "IRREGULAR MENSTRUAL CYCLE", p: 39 }, { t: "PAINFUL PERIODS", p: 40 },
            { t: "FIRST TRIMESTER PREGNANCY", p: 41 }, { t: "SECOND TRIMESTER PREGNANCY", p: 42 },
            { t: "THIRD TRIMESTER PREGNANCY", p: 43 }, { t: "INFERTILITY", p: 44 },
            { t: "MASTALGIA (Breast Pain)", p: 45 }, { t: "FIBROID UTERUS", p: 46 },
            { t: "ANAEMIA IN PREGNANCY", p: 47 }, { t: "GESTATIONAL HYPERTENSION", p: 48 },
            { t: "GESTATIONAL DIABETES", p: 49 }, { t: "MINOR AILMENTS PREGNANCY", p: 50 },
            { t: "ORAL CONTRACEPTIVE PILLS", p: 51 }, { t: "EMERGENCY CONTRACEPTION", p: 52 }
        ];

        async function initFlipbook() {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            try {
                const doc = await pdfjsLib.getDocument(PDF_URL).promise;
                pdfDoc = doc;
                const container = document.getElementById('book-container');
                for (let i = 1; i <= doc.numPages; i++) {
                    const page = await doc.getPage(i);
                    const viewport = page.getViewport({ scale: 2 });
                    const canvas = document.createElement('canvas');
                    canvas.height = viewport.height; canvas.width = viewport.width;
                    await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
                    const div = document.createElement('div');
                    div.className = 'page'; div.appendChild(canvas);
                    container.appendChild(div);
                    document.getElementById('load-progress').innerText = Math.round((i/doc.numPages)*100) + '%';
                }
                setupFlip();
                renderIndex();
                document.getElementById('loading-overlay').style.display = 'none';
            } catch (e) { console.error(e); }
        }

        function setupFlip() {
            pageFlip = new St.PageFlip(document.getElementById('book-container'), {
                width: 550, height: 800, size: "stretch", showCover: true, mobileScrollSupport: true, flippingTime: 1000
            });
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            pageFlip.on('flip', (e) => {
                document.getElementById('pageCurrent').innerText = e.data + 1;
                if (isSoundEnabled) { flipSound.currentTime = 0; flipSound.play(); }
            });
            document.getElementById('book-container').style.visibility = 'visible';
        }

        function toggleFullscreen() {
            const el = document.getElementById('app-content');
            if (!document.fullscreenElement) {
                if (el.requestFullscreen) el.requestFullscreen();
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function renderIndex() {
            const list = document.getElementById('fullIndexList');
            caseData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `${item.t} <span>Pg ${item.p}</span>`;
                div.onclick = () => { pageFlip.turnToPage(item.p - 1); closePanels(); };
                list.appendChild(div);
            });
        }

        document.getElementById('searchInput').oninput = (e) => {
            const q = e.target.value.toLowerCase();
            const res = document.getElementById('searchResults');
            res.innerHTML = '';
            if(q.length < 2) return;
            caseData.filter(c => c.t.toLowerCase().includes(q)).forEach(item => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `${item.t} <span>Pg ${item.p}</span>`;
                div.onclick = () => { pageFlip.turnToPage(item.p - 1); closePanels(); };
                res.appendChild(div);
            });
        };

        function togglePanel(id) {
            const p = document.getElementById(id);
            const active = p.classList.contains('active');
            closePanels();
            if(!active) p.classList.add('active');
        }

        function closePanels() {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        }

        document.getElementById('btnSound').onclick = function() {
            isSoundEnabled = !isSoundEnabled;
            this.innerHTML = isSoundEnabled ? '<i class="fas fa-volume-up"></i>Audio' : '<i class="fas fa-volume-mute"></i>Mute';
        };

        window.onload = initFlipbook;
    </script>
</body>
</html>
