<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Native Style Video Player Pro</title>
  <style>
    :root {
      --progress-fill-color: #ff5722; /* Orange progress bar */
      --progress-dot-color: #ff0000;  /* Red progress bar dot */
      --font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      /* REMOVES BLUE FLASH ON CLICK/TAP */
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    body {
      background-color: #121212;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: var(--font-family);
      overflow: hidden;
    }

    /* Video Player Container */
    .video-container {
      position: relative;
      width: 100%;
      max-width: 800px;
      background-color: #000;
      border-radius: 8px;
      overflow: hidden;
      /* PREVENTS HIGHLIGHTING/BLUE FLASH */
      user-select: none;
      -webkit-user-select: none;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      cursor: pointer;
    }

    /* Center Play Button Overlay */
    .center-play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 72px;
      height: 72px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: opacity 0.2s ease, transform 0.2s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      pointer-events: none; /* Let clicks pass through to the video logic */
    }

    .video-container:hover .center-play-btn {
        transform: translate(-50%, -50%) scale(1.05);
    }

    .center-play-btn svg {
      width: 28px;
      height: 28px;
      fill: #000000;
      margin-left: 4px;
    }

    /* Bottom Controls Container */
    .controls-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.4) 60%, transparent 100%);
      padding: 12px 16px 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: opacity 0.3s ease;
      z-index: 10;
    }

    /* Auto-hide class when playing */
    .video-container.user-inactive .controls-overlay,
    .video-container.user-inactive .center-play-btn {
      opacity: 0;
      pointer-events: none;
    }

    .controls-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #ffffff;
      font-size: 14px;
    }

    .time-display {
      font-variant-numeric: tabular-nums;
      color: #e0e0e0;
    }

    .action-buttons {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .btn {
      background: none;
      border: none;
      color: #ffffff;
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 5px;
      border-radius: 50%;
    }

    .btn svg {
      width: 22px;
      height: 22px;
      fill: #ffffff;
    }

    /* Progress Bar (Bottom Row) */
    .progress-container {
      width: 100%;
      display: flex;
      align-items: center;
    }

    .progress-bar {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 5px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.2);
      outline: none;
      cursor: pointer;
    }

    /* Progress Bar Thumb (The Dot) */
    .progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--progress-dot-color);
      cursor: pointer;
      border: 1px solid rgba(0,0,0,0.1);
      box-shadow: 0 0 2px rgba(0,0,0,0.5);
    }

    .progress-bar::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--progress-dot-color);
      border: none;
    }

    /* Options Menu */
    .options-menu {
      position: absolute;
      bottom: 60px;
      right: 16px;
      background: rgba(30, 30, 30, 0.95);
      border-radius: 8px;
      padding: 8px 0;
      display: none;
      flex-direction: column;
      z-index: 25;
      width: 170px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    .options-menu.active { display: flex; }

    .menu-item {
      padding: 12px 16px;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
    }

    .menu-item:hover { background-color: rgba(255,255,255,0.1); }
  </style>
</head>
<body>

  <div class="video-container" id="videoContainer">
    <video id="video" playsinline>
      <source src="https://stream.mux.com/BV3YZtogl89mg9VcNBhhnHm02Y34zI1nlMuMQfAbl3dM/highest.mp4" type="video/mp4">
    </video>

    <!-- Center Play/Pause Overlay -->
    <div class="center-play-btn" id="centerPlayBtn">
      <svg id="centerPlayIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>

    <div class="options-menu" id="optionsMenu">
      <div class="menu-item" id="speedToggle">Playback Speed: <span id="speedText">1x</span></div>
      <div class="menu-item" id="pipBtn">Picture-in-Picture</div>
    </div>

    <!-- Controls Overlay -->
    <div class="controls-overlay" id="controlsOverlay">
      <div class="controls-top-row">
        <div class="time-display">
          <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
        </div>
        <div class="action-buttons">
          <button class="btn" id="volumeBtn"><svg id="volumeIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></button>
          <button class="btn" id="fullscreenBtn"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
          <button class="btn" id="menuBtn"><svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></button>
        </div>
      </div>
      <div class="progress-container">
        <input type="range" class="progress-bar" id="progressBar" min="0" max="100" value="0" step="0.1">
      </div>
    </div>
  </div>

  <script>
    const container = document.getElementById('videoContainer');
    const video = document.getElementById('video');
    const centerBtn = document.getElementById('centerPlayBtn');
    const centerIcon = document.getElementById('centerPlayIcon');
    const progressBar = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');
    const volumeBtn = document.getElementById('volumeBtn');
    const volumeIcon = document.getElementById('volumeIcon');
    const menuBtn = document.getElementById('menuBtn');
    const optionsMenu = document.getElementById('optionsMenu');

    let clickTimer = null;

    // Handle Single Click (Play/Pause) and Double Click (Seek)
    video.addEventListener('click', (e) => {
      if (e.detail === 1) {
        // Single Click logic - delayed to check for double click
        clickTimer = setTimeout(() => {
          togglePlay();
        }, 250);
      }
    });

    video.addEventListener('dblclick', (e) => {
      // Double Click logic - cancels the pending single click
      clearTimeout(clickTimer);
      
      const rect = video.getBoundingClientRect();
      const x = e.clientX - rect.left;
      
      if (x < rect.width / 2) {
        // Left Side: Back 10s
        video.currentTime = Math.max(0, video.currentTime - 10);
      } else {
        // Right Side: Forward 10s
        video.currentTime = Math.min(video.duration, video.currentTime + 10);
      }
    });

    function togglePlay() {
      if (video.paused) video.play();
      else video.pause();
    }

    video.addEventListener('play', () => {
      centerIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; // Pause Icon
      centerBtn.style.opacity = '0';
    });

    video.addEventListener('pause', () => {
      centerIcon.innerHTML = '<path d="M8 5v14l11-7z"/>'; // Play Icon
      centerBtn.style.opacity = '1';
      container.classList.remove('user-inactive');
    });

    // Formatting
    const formatTime = (s) => isNaN(s) ? "0:00" : `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;

    video.addEventListener('timeupdate', () => {
      currentTimeEl.textContent = formatTime(video.currentTime);
      const percent = (video.currentTime / video.duration) * 100 || 0;
      progressBar.value = percent;
      // Orange fill behind the red dot
      progressBar.style.background = `linear-gradient(to right, var(--progress-fill-color) ${percent}%, rgba(255, 255, 255, 0.2) ${percent}%)`;
    });

    video.addEventListener('loadedmetadata', () => {
      durationEl.textContent = formatTime(video.duration);
    });

    progressBar.addEventListener('input', (e) => {
      video.currentTime = (e.target.value / 100) * video.duration;
    });

    volumeBtn.addEventListener('click', () => {
      video.muted = !video.muted;
      volumeIcon.style.opacity = video.muted ? '0.5' : '1';
    });

    document.getElementById('fullscreenBtn').addEventListener('click', () => {
      if (!document.fullscreenElement) container.requestFullscreen();
      else document.exitFullscreen();
    });

    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      optionsMenu.classList.toggle('active');
    });

    document.addEventListener('click', () => optionsMenu.classList.remove('active'));

    // Auto-hide controls
    let hideTimer;
    const resetTimer = () => {
      container.classList.remove('user-inactive');
      clearTimeout(hideTimer);
      if (!video.paused) hideTimer = setTimeout(() => container.classList.add('user-inactive'), 3000);
    };
    container.addEventListener('mousemove', resetTimer);
    container.addEventListener('touchstart', resetTimer);
  </script>
</body>
</html>
