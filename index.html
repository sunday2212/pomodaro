<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>YouTube Style HTML5 Player</title>
    <style>
        /* ── Reset & Base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto', Arial, sans-serif;
            padding: 20px;
        }

        /* ── Player Wrapper ── */
        .player-wrapper {
            width: 100%;
            max-width: 960px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        /* ── Video Container ── */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            /* 16:9 */
            background: #000;
            cursor: default;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            touch-action: manipulation;
        }

        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            pointer-events: none;
        }

        /* ── Controls Overlay ── */
        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, transparent 100%);
            padding: 16px 20px 14px 20px;
            opacity: 0;
            transition: opacity 0.25s ease;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }

        .controls>* {
            pointer-events: auto;
        }

        .video-container.show-controls .controls {
            opacity: 1;
        }

        /* ── Progress Bar ── */
        .progress-bar {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            position: relative;
            cursor: pointer;
            transition: height 0.15s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        .progress-bar:hover {
            height: 7px;
        }

        .progress-bar .filled {
            height: 100%;
            background: #ff0000;
            border-radius: 4px;
            width: 0%;
            position: relative;
            transition: width 0.05s linear;
        }

        .progress-bar .filled::after {
            content: '';
            position: absolute;
            right: -7px;
            top: 50%;
            transform: translateY(-50%);
            width: 13px;
            height: 13px;
            background: #ff0000;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.15s ease;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.5);
        }

        .progress-bar:hover .filled::after {
            opacity: 1;
        }

        .progress-bar .buffered {
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        /* ── Controls Bottom Row ── */
        .controls-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .controls-row .left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .controls-row .right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        /* ── Buttons ── */
        .ctrl-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s ease;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            touch-action: manipulation;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .ctrl-btn svg {
            width: 22px;
            height: 22px;
            fill: #fff;
        }

        .ctrl-btn.play-btn svg {
            width: 26px;
            height: 26px;
        }

        /* ── Time Display ── */
        .time-display {
            color: #fff;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.3px;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        .time-display .separator {
            margin: 0 2px;
            opacity: 0.6;
        }

        /* ── Volume ── */
        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-wrap .vol-btn {
            font-size: 18px;
            width: 32px;
            height: 32px;
        }

        .volume-wrap .vol-btn svg {
            width: 20px;
            height: 20px;
        }

        .volume-slider {
            width: 0;
            overflow: hidden;
            transition: width 0.2s ease;
        }

        .volume-wrap:hover .volume-slider,
        .volume-wrap .volume-slider.open {
            width: 70px;
        }

        .volume-slider input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 4px;
            outline: none;
            transition: background 0.2s;
        }

        .volume-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: #ff0000;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .volume-slider input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            background: #ff0000;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        /* ── Fullscreen ── */
        .fullscreen-btn svg {
            width: 22px;
            height: 22px;
        }

        /* ── Center Play / Pause Button ── */
        .center-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 72px;
            height: 72px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5;
            transition: opacity 0.25s ease, transform 0.2s ease, background 0.2s ease;
            opacity: 0;
            pointer-events: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            touch-action: manipulation;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .center-btn.show {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .center-btn:hover {
            background: rgba(0, 0, 0, 0.75);
            transform: translate(-50%, -50%) scale(1.05);
        }

        .center-btn:active {
            transform: translate(-50%, -50%) scale(0.92);
        }

        .center-btn svg {
            width: 36px;
            height: 36px;
            fill: #fff;
        }

        .center-btn .pause-icon {
            display: none;
        }
        .center-btn .play-icon {
            display: block;
            margin-left: 4px;
        }
        .center-btn.is-paused .pause-icon {
            display: none;
        }
        .center-btn.is-paused .play-icon {
            display: block;
        }
        .center-btn.is-playing .pause-icon {
            display: block;
        }
        .center-btn.is-playing .play-icon {
            display: none;
        }

        /* ── Loading Spinner ── */
        .spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 4;
            display: none;
            pointer-events: none;
        }

        .spinner.show {
            display: block;
        }

        .spinner svg {
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Seek Toast ── */
        .seek-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            color: #fff;
            font-size: 30px;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.7);
            padding: 14px 32px;
            border-radius: 10px;
            z-index: 6;
            opacity: 0;
            transition: opacity 0.15s ease, transform 0.2s ease;
            pointer-events: none;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            letter-spacing: 0.5px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-variant-numeric: tabular-nums;
            min-width: 80px;
            text-align: center;
        }

        .seek-toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .seek-toast.rewind {
            color: #ffcc00;
        }
        .seek-toast.forward {
            color: #00ccff;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .controls {
                padding: 12px 12px 10px 12px;
            }
            .controls-row {
                gap: 8px;
            }
            .ctrl-btn {
                width: 30px;
                height: 30px;
                font-size: 16px;
            }
            .ctrl-btn svg {
                width: 18px;
                height: 18px;
            }
            .ctrl-btn.play-btn svg {
                width: 22px;
                height: 22px;
            }
            .time-display {
                font-size: 11px;
            }
            .volume-wrap:hover .volume-slider {
                width: 50px;
            }
            .center-btn {
                width: 60px;
                height: 60px;
            }
            .center-btn svg {
                width: 28px;
                height: 28px;
            }
            .seek-toast {
                font-size: 22px;
                padding: 10px 22px;
                min-width: 60px;
            }
        }

        @media (max-width: 420px) {
            .controls-row .left {
                gap: 4px;
            }
            .controls-row .right {
                gap: 6px;
            }
            .volume-wrap .vol-btn {
                width: 26px;
                height: 26px;
            }
            .volume-wrap .vol-btn svg {
                width: 16px;
                height: 16px;
            }
            .time-display {
                font-size: 10px;
            }
            .ctrl-btn {
                width: 26px;
                height: 26px;
            }
            .ctrl-btn svg {
                width: 16px;
                height: 16px;
            }
            .ctrl-btn.play-btn svg {
                width: 20px;
                height: 20px;
            }
            .center-btn {
                width: 52px;
                height: 52px;
            }
            .center-btn svg {
                width: 24px;
                height: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="player-wrapper">
        <div class="video-container" id="videoContainer">

            <!-- Video -->
            <video id="video" preload="metadata" playsinline>
                <source src="https://stream.mux.com/BV3YZtogl89mg9VcNBhhnHm02Y34zI1nlMuMQfAbl3dM/highest.mp4" type="video/mp4" />
                Your browser does not support the video tag.
            </video>

            <!-- Loading Spinner -->
            <div class="spinner" id="spinner">
                <svg viewBox="0 0 50 50" fill="none" stroke="#fff" stroke-width="4">
                    <circle cx="25" cy="25" r="20" stroke-opacity="0.25" />
                    <circle cx="25" cy="25" r="20" stroke="#ff0000" stroke-dasharray="80 200" stroke-linecap="round" />
                </svg>
            </div>

            <!-- Center Play / Pause Button -->
            <div class="center-btn is-paused" id="centerBtn">
                <!-- Play icon (▶) -->
                <svg class="play-icon" viewBox="0 0 24 24">
                    <polygon points="5,3 19,12 5,21" />
                </svg>
                <!-- Pause icon (II) -->
                <svg class="pause-icon" viewBox="0 0 24 24">
                    <rect x="6" y="4" width="4" height="16" />
                    <rect x="14" y="4" width="4" height="16" />
                </svg>
            </div>

            <!-- Seek Toast -->
            <div class="seek-toast" id="seekToast"></div>

            <!-- Controls -->
            <div class="controls" id="controls">

                <!-- Progress Bar -->
                <div class="progress-bar" id="progressBar">
                    <div class="buffered" id="buffered"></div>
                    <div class="filled" id="progressFilled"></div>
                </div>

                <!-- Controls Row -->
                <div class="controls-row">

                    <!-- Left -->
                    <div class="left">
                        <!-- Play / Pause (bottom bar) -->
                        <button class="ctrl-btn play-btn" id="playBtn" aria-label="Play / Pause">
                            <svg viewBox="0 0 24 24">
                                <polygon points="5,3 19,12 5,21" />
                            </svg>
                        </button>

                        <!-- Time -->
                        <span class="time-display">
                            <span id="currentTime">0:00</span>
                            <span class="separator">/</span>
                            <span id="duration">0:00</span>
                        </span>
                    </div>

                    <!-- Right -->
                    <div class="right">
                        <!-- Volume -->
                        <div class="volume-wrap">
                            <button class="ctrl-btn vol-btn" id="volBtn" aria-label="Mute / Unmute">
                                <svg viewBox="0 0 24 24">
                                    <path d="M3,9v6h4l5,5V4L7,9H3z" />
                                    <path d="M16.5,12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-0.73,2.5-2.25,2.5-4.02z" />
                                    <path d="M19.5,12c0-3.04-1.64-5.67-4-7.08v14.16c2.36-1.41,4-4.04,4-7.08z" />
                                </svg>
                            </button>
                            <div class="volume-slider" id="volSliderWrap">
                                <input type="range" id="volSlider" min="0" max="1" step="0.01" value="1" />
                            </div>
                        </div>

                        <!-- Fullscreen -->
                        <button class="ctrl-btn fullscreen-btn" id="fullscreenBtn" aria-label="Fullscreen">
                            <svg viewBox="0 0 24 24">
                                <path d="M7,14H5v5h5v-2H7V14z M5,10h2V7h3V5H5V10z M17,17h-3v2h5v-5h-2V17z M14,5v2h3v3h2V5H14z" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ── DOM refs ──
            const video = document.getElementById('video');
            const container = document.getElementById('videoContainer');
            const controls = document.getElementById('controls');
            const playBtn = document.getElementById('playBtn');
            const centerBtn = document.getElementById('centerBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFilled = document.getElementById('progressFilled');
            const bufferedEl = document.getElementById('buffered');
            const currentTimeEl = document.getElementById('currentTime');
            const durationEl = document.getElementById('duration');
            const volBtn = document.getElementById('volBtn');
            const volSlider = document.getElementById('volSlider');
            const volSliderWrap = document.getElementById('volSliderWrap');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const spinner = document.getElementById('spinner');
            const seekToast = document.getElementById('seekToast');

            // ── State ──
            let isMuted = false;
            let controlsTimeout = null;
            let isControlsVisible = false;
            let isDragging = false;
            let wasPlayingBeforeDrag = false;
            let toastTimeout = null;
            let clickTimer = null;
            let clickCount = 0;

            // ── Helpers ──
            function formatTime(seconds) {
                if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
                const s = Math.floor(seconds);
                const m = Math.floor(s / 60);
                const secs = s % 60;
                return m + ':' + (secs < 10 ? '0' : '') + secs;
            }

            function togglePlay() {
                if (video.paused) {
                    video.play();
                } else {
                    video.pause();
                }
            }

            function updateCenterButton() {
                if (video.paused) {
                    centerBtn.className = 'center-btn is-paused';
                } else {
                    centerBtn.className = 'center-btn is-playing';
                }
            }

            function updatePlayIcon() {
                const svg = playBtn.querySelector('svg');
                if (video.paused) {
                    svg.innerHTML = '<polygon points="5,3 19,12 5,21" />';
                } else {
                    svg.innerHTML = '<rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" />';
                }
                updateCenterButton();
            }

            function updateVolumeIcon() {
                const svg = volBtn.querySelector('svg');
                if (isMuted || video.volume === 0) {
                    svg.innerHTML =
                        '<path d="M3,9v6h4l5,5V4L7,9H3z" /><path d="M19,11h-2v2h2V11z M19,7h-2v2h2V7z M19,15h-2v2h2V15z" />';
                } else if (video.volume < 0.5) {
                    svg.innerHTML =
                        '<path d="M3,9v6h4l5,5V4L7,9H3z" /><path d="M16.5,12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-0.73,2.5-2.25,2.5-4.02z" />';
                } else {
                    svg.innerHTML =
                        '<path d="M3,9v6h4l5,5V4L7,9H3z" /><path d="M16.5,12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-0.73,2.5-2.25,2.5-4.02z" /><path d="M19.5,12c0-3.04-1.64-5.67-4-7.08v14.16c2.36-1.41,4-4.04,4-7.08z" />';
                }
            }

            function updateProgress() {
                const percent = (video.currentTime / video.duration) * 100;
                progressFilled.style.width = percent + '%';
                currentTimeEl.textContent = formatTime(video.currentTime);
                durationEl.textContent = formatTime(video.duration);
            }

            function updateBuffered() {
                if (video.buffered.length > 0) {
                    const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                    const percent = (bufferedEnd / video.duration) * 100;
                    bufferedEl.style.width = percent + '%';
                }
            }

            function showControls(force) {
                if (force) {
                    container.classList.add('show-controls');
                    isControlsVisible = true;
                } else {
                    container.classList.add('show-controls');
                    isControlsVisible = true;
                    clearTimeout(controlsTimeout);
                    controlsTimeout = setTimeout(() => {
                        // Don't hide controls if video is paused or if center button is shown
                        if (!video.paused && !video.ended) {
                            container.classList.remove('show-controls');
                            isControlsVisible = false;
                            // If playing, hide center button when controls hide
                            if (!video.paused) {
                                centerBtn.classList.remove('show');
                            }
                        }
                    }, 3000);
                }
            }

            function hideControls() {
                if (!video.paused && !video.ended && !isDragging) {
                    container.classList.remove('show-controls');
                    isControlsVisible = false;
                    centerBtn.classList.remove('show');
                }
            }

            function showCenterBtn(show) {
                if (show) {
                    centerBtn.classList.add('show');
                } else {
                    centerBtn.classList.remove('show');
                }
            }

            // ── Seek Toast ──
            function showSeekToast(text, isRewind) {
                if (toastTimeout) {
                    clearTimeout(toastTimeout);
                    toastTimeout = null;
                }
                seekToast.textContent = text;
                seekToast.className = 'seek-toast show ' + (isRewind ? 'rewind' : 'forward');
                toastTimeout = setTimeout(() => {
                    seekToast.className = 'seek-toast';
                    toastTimeout = null;
                }, 800);
            }

            function seekBy(seconds) {
                if (!video.duration || isNaN(video.duration)) return;
                const newTime = Math.max(0, Math.min(video.duration, video.currentTime + seconds));
                video.currentTime = newTime;
                const isRewind = seconds < 0;
                const label = (isRewind ? '' : '+') + Math.abs(seconds) + 's';
                showSeekToast(label, isRewind);
                // Show controls briefly
                showControls(true);
                // Keep center button visible if video is playing
                if (!video.paused) {
                    showCenterBtn(true);
                }
                // Update progress
                updateProgress();
            }

            // ── Click handling for single vs double click ──
            function handleContainerClick(e) {
                // Ignore clicks on controls, center button, progress bar
                if (e.target.closest('.controls')) return;
                if (e.target.closest('.center-btn')) return;
                if (e.target.closest('.progress-bar')) return;

                // Get click position relative to container width
                const rect = container.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;

                // Track clicks for double-click detection
                clickCount++;
                if (clickCount === 1) {
                    clickTimer = setTimeout(() => {
                        // Single click
                        clickCount = 0;
                        handleSingleClick(x);
                    }, 280);
                } else if (clickCount >= 2) {
                    // Double click
                    clearTimeout(clickTimer);
                    clickCount = 0;
                    handleDoubleClick(x);
                }
            }

            function handleSingleClick(x) {
                // Single click: toggle controls visibility
                // If video is paused, show center button with play icon
                if (video.paused || video.ended) {
                    // If paused, show center button (it's already shown with play icon)
                    showControls(true);
                    showCenterBtn(true);
                    return;
                }

                // Video is playing: toggle controls
                if (isControlsVisible) {
                    // If controls are visible, hide them
                    hideControls();
                    showCenterBtn(false);
                } else {
                    // Show controls and center button (with pause icon)
                    showControls(true);
                    showCenterBtn(true);
                    // Update center button to show pause icon
                    updateCenterButton();
                }
            }

            function handleDoubleClick(x) {
                // Double click: seek based on position
                // Left third: rewind, Right third: forward, Middle: do nothing
                if (x < 0.33) {
                    seekBy(-10);
                } else if (x > 0.67) {
                    seekBy(10);
                } else {
                    // Middle third double-click: toggle controls (like single click)
                    // But since it's a double click, we'll just show controls briefly
                    showControls(true);
                    if (!video.paused) {
                        showCenterBtn(true);
                        updateCenterButton();
                    }
                }
            }

            // ── Event Listeners ──

            // Container click (single/double detection)
            container.addEventListener('click', handleContainerClick);

            // Touch support for double-tap
            let lastTouchTime = 0;
            let touchX = 0;
            container.addEventListener('touchend', (e) => {
                // Ignore if touching controls, center button, progress bar
                if (e.target.closest('.controls')) return;
                if (e.target.closest('.center-btn')) return;
                if (e.target.closest('.progress-bar')) return;

                const touch = e.changedTouches[0];
                const rect = container.getBoundingClientRect();
                const x = (touch.clientX - rect.left) / rect.width;

                const now = Date.now();
                const timeDiff = now - lastTouchTime;

                if (timeDiff < 300 && timeDiff > 20) {
                    // Double tap
                    lastTouchTime = 0;
                    // Left/right detection
                    if (x < 0.33) {
                        seekBy(-10);
                    } else if (x > 0.67) {
                        seekBy(10);
                    } else {
                        // Middle: toggle controls
                        if (video.paused || video.ended) {
                            showControls(true);
                            showCenterBtn(true);
                        } else if (isControlsVisible) {
                            hideControls();
                            showCenterBtn(false);
                        } else {
                            showControls(true);
                            showCenterBtn(true);
                            updateCenterButton();
                        }
                    }
                } else {
                    // Single tap - store for potential double
                    lastTouchTime = now;
                    touchX = x;
                    // Don't act immediately, wait to see if double tap follows
                    setTimeout(() => {
                        if (lastTouchTime === now) {
                            // It was a single tap
                            lastTouchTime = 0;
                            // Single tap: toggle controls
                            if (video.paused || video.ended) {
                                showControls(true);
                                showCenterBtn(true);
                            } else if (isControlsVisible) {
                                // If controls visible, hide them on tap
                                hideControls();
                                showCenterBtn(false);
                            } else {
                                showControls(true);
                                showCenterBtn(true);
                                updateCenterButton();
                            }
                        }
                    }, 300);
                }
            }, { passive: true });

            // ── Center button ──
            centerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                // Toggle play/pause
                togglePlay();
                // If video was paused and now playing, hide center button after a moment
                if (!video.paused) {
                    // Center button will be updated via 'play' event
                    showControls(false);
                    // Keep center button visible briefly, then it will hide with controls
                } else {
                    // Paused: show center button with play icon
                    showControls(true);
                    showCenterBtn(true);
                    updateCenterButton();
                }
            });

            // Center button touch
            centerBtn.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                // Prevent double-tap from triggering on center button
            }, { passive: true });

            // ── Video events ──
            video.addEventListener('play', () => {
                updatePlayIcon();
                updateCenterButton();
                // Hide center button after a short delay (controls will auto-hide)
                setTimeout(() => {
                    if (!video.paused) {
                        showCenterBtn(false);
                        // Start the auto-hide timer for controls
                        showControls(false);
                    }
                }, 400);
            });

            video.addEventListener('pause', () => {
                updatePlayIcon();
                updateCenterButton();
                // When paused, show center button with play icon and keep controls visible
                showControls(true);
                showCenterBtn(true);
            });

            video.addEventListener('ended', () => {
                updatePlayIcon();
                updateCenterButton();
                showControls(true);
                showCenterBtn(true);
                // Show replay icon (play button)
                centerBtn.className = 'center-btn is-paused';
            });

            // Time updates
            video.addEventListener('timeupdate', () => {
                updateProgress();
                updateBuffered();
            });

            video.addEventListener('loadedmetadata', () => {
                durationEl.textContent = formatTime(video.duration);
                updateProgress();
                // Show center button initially
                showControls(true);
                showCenterBtn(true);
            });

            video.addEventListener('progress', updateBuffered);

            // Loading spinner
            video.addEventListener('waiting', () => {
                spinner.classList.add('show');
            });
            video.addEventListener('canplay', () => {
                spinner.classList.remove('show');
            });
            video.addEventListener('playing', () => {
                spinner.classList.remove('show');
            });

            // ── Progress bar seeking (mouse) ──
            progressBar.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                isDragging = true;
                wasPlayingBeforeDrag = !video.paused;
                if (!video.paused) video.pause();
                const rect = progressBar.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;
                video.currentTime = x * video.duration;
                updateProgress();
                showControls(true);
                showCenterBtn(true);
                updateCenterButton();
            });

            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const rect = progressBar.getBoundingClientRect();
                    let x = (e.clientX - rect.left) / rect.width;
                    x = Math.max(0, Math.min(1, x));
                    video.currentTime = x * video.duration;
                    updateProgress();
                }
            });

            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    if (wasPlayingBeforeDrag) {
                        video.play();
                    } else {
                        // If it was paused, keep it paused and show center button
                        showControls(true);
                        showCenterBtn(true);
                        updateCenterButton();
                    }
                }
            });

            // ── Progress bar seeking (touch) ──
            progressBar.addEventListener('touchstart', (e) => {
                e.preventDefault();
                e.stopPropagation();
                isDragging = true;
                wasPlayingBeforeDrag = !video.paused;
                if (!video.paused) video.pause();
                const rect = progressBar.getBoundingClientRect();
                const touch = e.touches[0];
                const x = (touch.clientX - rect.left) / rect.width;
                video.currentTime = x * video.duration;
                updateProgress();
                showControls(true);
                showCenterBtn(true);
                updateCenterButton();
            }, { passive: false });

            progressBar.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (isDragging) {
                    const rect = progressBar.getBoundingClientRect();
                    const touch = e.touches[0];
                    let x = (touch.clientX - rect.left) / rect.width;
                    x = Math.max(0, Math.min(1, x));
                    video.currentTime = x * video.duration;
                    updateProgress();
                }
            }, { passive: false });

            progressBar.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (isDragging) {
                    isDragging = false;
                    if (wasPlayingBeforeDrag) {
                        video.play();
                    } else {
                        showControls(true);
                        showCenterBtn(true);
                        updateCenterButton();
                    }
                }
            }, { passive: false });

            // ── Volume ──
            volBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (isMuted) {
                    video.muted = false;
                    isMuted = false;
                    volSlider.value = video.volume;
                } else {
                    video.muted = true;
                    isMuted = true;
                    volSlider.value = 0;
                }
                updateVolumeIcon();
            });

            volSlider.addEventListener('input', () => {
                const val = parseFloat(volSlider.value);
                video.volume = val;
                video.muted = (val === 0);
                isMuted = (val === 0);
                updateVolumeIcon();
            });

            video.addEventListener('volumechange', () => {
                volSlider.value = video.volume;
                isMuted = video.muted;
                updateVolumeIcon();
            });

            // Volume slider hover toggle
            volBtn.addEventListener('mouseenter', () => {
                volSliderWrap.classList.add('open');
            });
            volSliderWrap.addEventListener('mouseleave', () => {
                volSliderWrap.classList.remove('open');
            });

            // ── Fullscreen ──
            fullscreenBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!document.fullscreenElement) {
                    container.requestFullscreen?.() ||
                        container.webkitRequestFullscreen?.() ||
                        container.msRequestFullscreen?.();
                } else {
                    document.exitFullscreen?.() ||
                        document.webkitExitFullscreen?.() ||
                        document.msExitFullscreen?.();
                }
            });

            document.addEventListener('fullscreenchange', updateFullscreenIcon);
            document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);
            document.addEventListener('msfullscreenchange', updateFullscreenIcon);

            function updateFullscreenIcon() {
                const isFull = !!document.fullscreenElement ||
                    !!document.webkitFullscreenElement ||
                    !!document.msFullscreenElement;
                const svg = fullscreenBtn.querySelector('svg');
                if (isFull) {
                    svg.innerHTML =
                        '<path d="M5,16h3v3h2v-5H5V16z M8,8H5v2h5V5H8V8z M16,19h2v-3h3v-2h-5V19z M19,8h-2V5h-2v5h4V8z" />';
                } else {
                    svg.innerHTML =
                        '<path d="M7,14H5v5h5v-2H7V14z M5,10h2V7h3V5H5V10z M17,17h-3v2h5v-5h-2V17z M14,5v2h3v3h2V5H14z" />';
                }
            }

            // ── Keyboard shortcuts ──
            document.addEventListener('keydown', (e) => {
                const tag = e.target.tagName;
                if (tag === 'INPUT') return;

                switch (e.key) {
                    case ' ':
                    case 'k':
                        e.preventDefault();
                        togglePlay();
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        seekBy(10);
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        seekBy(-10);
                        break;
                    case 'f':
                        fullscreenBtn.click();
                        break;
                    case 'm':
                        volBtn.click();
                        break;
                }
            });

            // ── Mouse movement to show controls ──
            container.addEventListener('mousemove', () => {
                if (!video.paused && !video.ended) {
                    showControls(false);
                    // Show center button briefly when moving mouse
                    if (isControlsVisible) {
                        showCenterBtn(true);
                        updateCenterButton();
                    }
                }
            });

            container.addEventListener('mouseleave', () => {
                if (!video.paused && !video.ended) {
                    hideControls();
                    showCenterBtn(false);
                }
            });

            // ── Init ──
            updatePlayIcon();
            updateVolumeIcon();
            updateProgress();

            // Show controls and center button initially
            showControls(true);
            showCenterBtn(true);

            // If video autoplays, hide center button after a moment
            if (!video.paused) {
                setTimeout(() => {
                    showCenterBtn(false);
                    showControls(false);
                }, 1000);
            }

            // ── Handle visibility when tab changes ──
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    // Tab hidden: do nothing
                } else {
                    // Tab visible: if video is playing, controls should be hidden
                    if (!video.paused && !video.ended) {
                        hideControls();
                        showCenterBtn(false);
                    } else if (video.paused) {
                        showControls(true);
                        showCenterBtn(true);
                    }
                }
            });

        })();
    </script>

</body>
</html>
