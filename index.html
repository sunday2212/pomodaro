<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Video Player with Speed Slider</title>
  <style>
    :root {
      --progress-fill: #ff5722; /* Orange */
      --progress-dot: #ff0000;  /* Red */
      --font: system-ui, -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      background-color: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: var(--font);
    }

    .video-container {
      position: relative;
      width: 100%;
      max-width: 850px;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      cursor: pointer;
    }

    /* TOP RIGHT SETTINGS - Clean, no shadow */
    .settings-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 20;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s;
    }

    .settings-menu {
      position: absolute;
      top: 55px;
      right: 15px;
      background: rgba(28, 28, 28, 0.98);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      width: 220px;
      display: none;
      flex-direction: column;
      padding: 5px 0;
      z-index: 30;
      overflow: hidden;
    }

    .settings-menu.active { display: flex; }

    /* Menu Content Views */
    .menu-view { padding: 5px 0; }
    .speed-view { display: none; padding: 15px; }

    .menu-item {
      padding: 12px 16px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .menu-item:hover { background: rgba(255,255,255,0.1); }

    /* Horizontal Speed Bar Styling */
    .speed-header {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #fff;
        font-size: 13px;
        margin-bottom: 15px;
        cursor: pointer;
    }
    .speed-slider-container {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .speed-val-display {
        color: var(--progress-fill);
        font-weight: bold;
        font-size: 16px;
        text-align: center;
    }

    .speed-range {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.2);
      outline: none;
    }
    .speed-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--progress-dot);
      cursor: pointer;
      border: 2px solid white;
    }

    /* CENTER OVERLAYS */
    .center-play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 5;
    }

    /* SEEK ANIMATION */
    .seek-feedback {
      position: absolute;
      top: 0; bottom: 0; width: 50%;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 4; opacity: 0;
    }
    .seek-left { left: 0; }
    .seek-right { right: 0; }
    .seek-feedback svg { width: 50px; fill: rgba(0, 0, 0, 0.6); }

    @keyframes seekAnim {
      0% { opacity: 0; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.1); }
    }
    .animate-seek { animation: seekAnim 0.6s ease-out forwards; }

    /* BOTTOM CONTROLS */
    .controls-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      padding: 10px 15px 15px 15px;
      display: flex; flex-direction: column; gap: 10px;
      z-index: 10; transition: opacity 0.3s;
    }

    .video-container.inactive .controls-overlay,
    .video-container.inactive .settings-btn,
    .video-container.inactive .center-play { opacity: 0; pointer-events: none; }

    .controls-row { display: flex; align-items: center; justify-content: space-between; }
    .time-box { color: #fff; font-size: 14px; font-variant-numeric: tabular-nums; }
    .action-group { display: flex; align-items: center; gap: 14px; }
    .ctrl-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; }
    .ctrl-btn svg { width: 24px; height: 24px; fill: #fff; }

    /* PROGRESS BAR */
    .prog-container { width: 100%; display: flex; align-items: center; }
    .prog-bar {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.3);
      outline: none;
      cursor: pointer;
    }
    .prog-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--progress-dot); cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="video-container" id="player">
    <video id="mainVideo" playsinline>
      <source src="https://stream.mux.com/BV3YZtogl89mg9VcNBhhnHm02Y34zI1nlMuMQfAbl3dM/highest.mp4" type="video/mp4">
    </video>

    <!-- Settings Gear -->
    <button class="settings-btn" id="setBtn">
      <svg viewBox="0 0 24 24" fill="white" width="28"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>

    <!-- Settings Menu -->
    <div class="settings-menu" id="setMenu">
      <!-- Main Options -->
      <div id="mainMenuView" class="menu-view">
        <div class="menu-item" id="openSpeed">Speed <span id="currentSpeedLabel">1x</span></div>
        <div class="menu-item" id="pipOption">Picture-in-Picture</div>
      </div>
      <!-- Speed Slider View -->
      <div id="speedSliderView" class="speed-view">
        <div class="speed-header" id="backToMenu">
            <svg viewBox="0 0 24 24" width="18" fill="white"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Playback Speed
        </div>
        <div class="speed-slider-container">
            <div class="speed-val-display" id="speedVal">1.0x</div>
            <input type="range" class="speed-range" id="speedRange" min="0.5" max="3" step="0.1" value="1">
        </div>
      </div>
    </div>

    <!-- Center Play/Pause & Feedback -->
    <div class="seek-feedback seek-left" id="seekLeft"><svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg></div>
    <div class="seek-feedback seek-right" id="seekRight"><svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg></div>
    <div class="center-play" id="centerPlay">
       <svg id="playIcon" viewBox="0 0 24 24" width="34"><path d="M8 5v14l11-7z" fill="black"/></svg>
    </div>

    <!-- Bottom Controls -->
    <div class="controls-overlay">
      <div class="controls-row">
        <div class="time-box"><span id="currTime">0:00</span> / <span id="duration">0:00</span></div>
        <div class="action-group">
          <button class="ctrl-btn" id="volBtn"><svg id="volIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></button>
          <button class="ctrl-btn" id="fullBtn"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
        </div>
      </div>
      <div class="prog-container"><input type="range" class="prog-bar" id="progBar" min="0" max="100" value="0" step="0.1"></div>
    </div>
  </div>

  <script>
    const player = document.getElementById('player');
    const video = document.getElementById('mainVideo');
    const progBar = document.getElementById('progBar');
    const currTimeEl = document.getElementById('currTime');
    const durEl = document.getElementById('duration');
    const setBtn = document.getElementById('setBtn');
    const setMenu = document.getElementById('setMenu');
    const mainView = document.getElementById('mainMenuView');
    const speedView = document.getElementById('speedSliderView');
    const speedRange = document.getElementById('speedRange');
    const speedValLabel = document.getElementById('speedVal');
    const currentSpeedLabel = document.getElementById('currentSpeedLabel');
    const playIcon = document.getElementById('playIcon');

    let clickTimeout;

    // Single Click (Play/Pause) & Double Click (Seek)
    video.onclick = (e) => {
      if (e.detail === 1) clickTimeout = setTimeout(() => { if (video.paused) video.play(); else video.pause(); }, 250);
    };
    video.ondblclick = (e) => {
      clearTimeout(clickTimeout);
      const x = e.clientX - video.getBoundingClientRect().left;
      const seekTarget = x < video.clientWidth / 2 ? 'seekLeft' : 'seekRight';
      video.currentTime += (seekTarget === 'seekLeft' ? -10 : 10);
      const animEl = document.getElementById(seekTarget);
      animEl.classList.remove('animate-seek'); void animEl.offsetWidth; animEl.classList.add('animate-seek');
    };

    video.onplay = () => { document.getElementById('centerPlay').style.opacity = '0'; playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="black"/>'; };
    video.onpause = () => { document.getElementById('centerPlay').style.opacity = '1'; playIcon.innerHTML = '<path d="M8 5v14l11-7z" fill="black"/>'; player.classList.remove('inactive'); };

    // Update Progress
    const fmt = (s) => isNaN(s) ? "0:00" : `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
    video.ontimeupdate = () => {
      currTimeEl.textContent = fmt(video.currentTime);
      const p = (video.currentTime / video.duration) * 100 || 0;
      progBar.value = p;
      progBar.style.background = `linear-gradient(to right, var(--progress-fill) ${p}%, rgba(255,255,255,0.3) ${p}%)`;
    };
    video.onloadedmetadata = () => durEl.textContent = fmt(video.duration);
    progBar.oninput = (e) => video.currentTime = (e.target.value / 100) * video.duration;

    // Settings Toggle Logic
    setBtn.onclick = (e) => { e.stopPropagation(); setMenu.classList.toggle('active'); resetMenuView(); };
    document.getElementById('openSpeed').onclick = (e) => { e.stopPropagation(); mainView.style.display = 'none'; speedView.style.display = 'block'; };
    document.getElementById('backToMenu').onclick = (e) => { e.stopPropagation(); resetMenuView(); };
    function resetMenuView() { mainView.style.display = 'block'; speedView.style.display = 'none'; }
    document.onclick = () => setMenu.classList.remove('active');

    // Speed Slider Action
    speedRange.oninput = (e) => {
      const val = parseFloat(e.target.value).toFixed(1);
      video.playbackRate = val;
      speedValLabel.textContent = val + 'x';
      currentSpeedLabel.textContent = val + 'x';
    };

    // PiP & Other Buttons
    document.getElementById('pipOption').onclick = async () => { try { if (video !== document.pictureInPictureElement) await video.requestPictureInPicture(); else await document.exitPictureInPicture(); } catch(e){} };
    document.getElementById('volBtn').onclick = () => { video.muted = !video.muted; document.getElementById('volIcon').style.opacity = video.muted ? 0.4 : 1; };
    document.getElementById('fullBtn').onclick = () => { if (!document.fullscreenElement) player.requestFullscreen(); else document.exitFullscreen(); };

    // Auto-hide
    let hT; const resetH = () => { player.classList.remove('inactive'); clearTimeout(hT); if (!video.paused) hT = setTimeout(() => player.classList.add('inactive'), 3000); };
    player.onmousemove = resetH; player.ontouchstart = resetH;
  </script>
</body>
</html>
