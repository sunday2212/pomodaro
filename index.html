<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OPD Mastery - Clinical Reference</title>
    
    <!-- PWA Primary Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- DFlip Style Sheet (Hosted CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.10/css/dflip.min.css" rel="stylesheet" type="text/css">
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.10/css/themify-icons.min.css" rel="stylesheet" type="text/css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Full Screen Loading Container */
        #flipbook-container {
            height: 100vh;
            width: 100vw;
        }

        /* Custom Header for NEXTPULSE App Branding */
        .app-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            display: flex;
            align-items: center;
            padding-left: 20px;
            z-index: 9999;
            border-bottom: 1px solid #333;
        }

        /* Responsive Fixes for Mobile */
        @media (max-width: 600px) {
            .app-header h1 { font-size: 16px; }
            .df-ui-controls { bottom: 10px !important; }
        }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>NEXTPULSE | OPD Mastery Book</h1>
    </div>

    <!-- The Flipbook Container -->
    <div id="flipbook-container"></div>

    <!-- jQuery (Required for the flip engine) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- DFlip Plugin JS -->
    <script src="https://cdn.jsdelivr.net/npm/dflip@1.0.10/js/dflip.min.js"></script>

    <script>
        jQuery(document).ready(function () {
            // PDF URL from your source
            var pdfUrl = "https://cdnc.heyzine.com/files/uploaded/2f525ee1fda444bde96c5ba29e86b8d86fe889a9.pdf";
            
            var options = {
                // Book Settings
                height: window.innerHeight,
                duration: 800,           // Flip speed
                direction: DFLIP.DIRECTION.LTR,
                
                // Features
                autoEnableOutline: true,  // Shows Index/Table of Contents
                autoEnableThumbnail: true,
                enableSearch: true,       // Search functionality
                enableSound: true,        // Realistic Page Turn Sound
                
                // UI Customization
                moreControls: "download,print,play,search,fullScreen",
                allControls: "altPrev,pageNumber,altNext,outline,thumbnail,zoomIn,zoomOut,fullScreen,share,search,more,download",
                
                // 3D Realistic Settings
                webgl: true,              // Hardware acceleration for real folding look
                scrollWheel: true,
                paddingTop: 50,           // Space for our header
            };

            // Initialize Flipbook
            var flipBook = $("#flipbook-container").flipBook(pdfUrl, options);
        });

        // Ensure responsive resizing
        window.onresize = function() {
            location.reload(); 
        };
    </script>
</body>
</html>
