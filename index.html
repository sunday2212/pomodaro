<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Pro Video Player</title>
  <style>
    :root {
      --progress-fill: #ff5722; /* Orange progress bar */
      --progress-dot: #ff0000;  /* Red progress bar dot */
      --control-bg: rgba(0, 0, 0, 0.7);
      --font: system-ui, -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      /* REMOVE BLUE HIGHLIGHT/FLASH ON CLICK */
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      background-color: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: var(--font);
    }

    .video-container {
      position: relative;
      width: 100%;
      max-width: 850px;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      cursor: pointer;
    }

    /* Top Right Settings */
    .settings-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.4);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s, transform 0.2s;
    }
    
    .settings-btn:hover { transform: rotate(45deg); background: rgba(0,0,0,0.6); }

    .settings-menu {
      position: absolute;
      top: 60px;
      right: 15px;
      background: rgba(28, 28, 28, 0.95);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      width: 180px;
      display: none;
      flex-direction: column;
      padding: 8px 0;
      z-index: 30;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .settings-menu.active { display: flex; }

    .menu-item {
      padding: 12px 16px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      transition: background 0.2s;
    }
    .menu-item:hover { background: rgba(255,255,255,0.1); }

    /* Center Play/Pause */
    .center-play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 5;
      transition: opacity 0.3s;
    }

    /* Bottom Controls */
    .controls-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      padding: 10px 15px 15px 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
      transition: opacity 0.3s;
    }

    /* Auto-hide logic */
    .video-container.inactive .controls-overlay,
    .video-container.inactive .settings-btn,
    .video-container.inactive .center-play {
      opacity: 0;
      pointer-events: none;
    }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .time-box {
      color: #fff;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }

    .action-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 5px;
      border-radius: 50%;
      display: flex;
      align-items: center;
    }

    .ctrl-btn svg { width: 24px; height: 24px; fill: #fff; }

    /* Progress Bar styling */
    .prog-container { width: 100%; display: flex; align-items: center; }
    
    .prog-bar {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 5px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.2);
      outline: none;
      cursor: pointer;
    }

    /* Red Dot */
    .prog-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--progress-dot);
      cursor: pointer;
      box-shadow: 0 0 5px rgba(0,0,0,0.5);
    }
    .prog-bar::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--progress-dot); border: none;
    }
  </style>
</head>
<body>

  <div class="video-container" id="player">
    <video id="mainVideo" playsinline>
      <source src="https://stream.mux.com/BV3YZtogl89mg9VcNBhhnHm02Y34zI1nlMuMQfAbl3dM/highest.mp4" type="video/mp4">
    </video>

    <!-- Settings at Top Right -->
    <button class="settings-btn" id="setBtn">
      <svg viewBox="0 0 24 24" fill="white" width="24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>

    <div class="settings-menu" id="setMenu">
      <div class="menu-item" id="speedOption">Speed <span id="speedTxt">1x</span></div>
      <div class="menu-item" id="pipOption">Picture-in-Picture</div>
    </div>

    <!-- Center Play/Pause -->
    <div class="center-play" id="centerPlay">
       <svg id="playIcon" viewBox="0 0 24 24" width="30"><path d="M8 5v14l11-7z" fill="black"/></svg>
    </div>

    <!-- Bottom Controls -->
    <div class="controls-overlay">
      <div class="controls-row">
        <div class="time-box">
          <span id="currTime">0:00</span> / <span id="duration">0:00</span>
        </div>
        
        <div class="action-group">
          <!-- Volume Button -->
          <button class="ctrl-btn" id="volBtn">
            <svg id="volIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          </button>
          <!-- Fullscreen Button -->
          <button class="ctrl-btn" id="fullBtn">
            <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
          </button>
        </div>
      </div>

      <div class="prog-container">
        <input type="range" class="prog-bar" id="progBar" min="0" max="100" value="0" step="0.1">
      </div>
    </div>
  </div>

  <script>
    const player = document.getElementById('player');
    const video = document.getElementById('mainVideo');
    const progBar = document.getElementById('progBar');
    const currTimeEl = document.getElementById('currTime');
    const durEl = document.getElementById('duration');
    const setBtn = document.getElementById('setBtn');
    const setMenu = document.getElementById('setMenu');
    const playIcon = document.getElementById('playIcon');
    const speedTxt = document.getElementById('speedTxt');

    let clickTimeout;

    // Handle Clicks/Double Clicks on Video
    video.addEventListener('click', (e) => {
      if (e.detail === 1) {
        clickTimeout = setTimeout(() => togglePlay(), 250);
      }
    });

    video.addEventListener('dblclick', (e) => {
      clearTimeout(clickTimeout);
      const rect = video.getBoundingClientRect();
      const x = e.clientX - rect.left;
      if (x < rect.width / 2) {
        video.currentTime = Math.max(0, video.currentTime - 10);
      } else {
        video.currentTime = Math.min(video.duration, video.currentTime + 10);
      }
    });

    function togglePlay() {
      if (video.paused) video.play();
      else video.pause();
    }

    video.onplay = () => {
      document.getElementById('centerPlay').style.opacity = '0';
      playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="black"/>';
    };
    video.onpause = () => {
      document.getElementById('centerPlay').style.opacity = '1';
      playIcon.innerHTML = '<path d="M8 5v14l11-7z" fill="black"/>';
      player.classList.remove('inactive');
    };

    // Time & Progress Update
    const fmt = (s) => isNaN(s) ? "0:00" : `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;

    video.ontimeupdate = () => {
      currTimeEl.textContent = fmt(video.currentTime);
      const p = (video.currentTime / video.duration) * 100 || 0;
      progBar.value = p;
      progBar.style.background = `linear-gradient(to right, var(--progress-fill) ${p}%, rgba(255,255,255,0.2) ${p}%)`;
    };

    video.onloadedmetadata = () => durEl.textContent = fmt(video.duration);

    progBar.oninput = (e) => {
      video.currentTime = (e.target.value / 100) * video.duration;
    };

    // Controls Logic
    document.getElementById('volBtn').onclick = () => {
      video.muted = !video.muted;
      document.getElementById('volIcon').style.opacity = video.muted ? 0.4 : 1;
    };

    document.getElementById('fullBtn').onclick = () => {
      if (!document.fullscreenElement) player.requestFullscreen();
      else document.exitFullscreen();
    };

    // Settings Menu Logic
    setBtn.onclick = (e) => {
      e.stopPropagation();
      setMenu.classList.toggle('active');
    };

    document.onclick = () => setMenu.classList.remove('active');

    // Speed Toggle
    const speeds = [1, 1.25, 1.5, 2, 0.5];
    let sIdx = 0;
    document.getElementById('speedOption').onclick = (e) => {
      e.stopPropagation();
      sIdx = (sIdx + 1) % speeds.length;
      video.playbackRate = speeds[sIdx];
      speedTxt.textContent = speeds[sIdx] + 'x';
    };

    // Picture-in-Picture
    document.getElementById('pipOption').onclick = async () => {
      try {
        if (video !== document.pictureInPictureElement) await video.requestPictureInPicture();
        else await document.exitPictureInPicture();
      } catch (err) { console.error(err); }
    };

    // Auto-hide Controls
    let hT;
    const resetH = () => {
      player.classList.remove('inactive');
      clearTimeout(hT);
      if (!video.paused) hT = setTimeout(() => player.classList.add('inactive'), 3000);
    };
    player.onmousemove = resetH;
    player.ontouchstart = resetH;
  </script>
</body>
</html>
