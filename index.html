<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>YouTube Style HTML5 Player</title>
    <style>
        /* ── Reset & Base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto', Arial, sans-serif;
            padding: 20px;
        }

        /* ── Player Wrapper ── */
        .player-wrapper {
            width: 100%;
            max-width: 960px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        /* ── Video Container ── */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            /* 16:9 */
            background: #000;
            cursor: default;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            touch-action: manipulation;
            overflow: hidden;
        }

        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            pointer-events: none;
        }

        /* ── Controls Overlay ── */
        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, transparent 100%);
            padding: 16px 20px 14px 20px;
            opacity: 0;
            transition: opacity 0.25s ease;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }

        .controls>* {
            pointer-events: auto;
        }

        .video-container.show-controls .controls {
            opacity: 1;
        }

        /* ── Progress Bar ── */
        .progress-bar {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            position: relative;
            cursor: pointer;
            transition: height 0.15s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        .progress-bar:hover {
            height: 7px;
        }

        .progress-bar .filled {
            height: 100%;
            background: #ff0000;
            border-radius: 4px;
            width: 0%;
            position: relative;
            transition: width 0.05s linear;
        }

        .progress-bar .filled::after {
            content: '';
            position: absolute;
            right: -7px;
            top: 50%;
            transform: translateY(-50%);
            width: 13px;
            height: 13px;
            background: #ff0000;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.15s ease;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.5);
        }

        .progress-bar:hover .filled::after {
            opacity: 1;
        }

        .progress-bar .buffered {
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        /* ── Controls Bottom Row ── */
        .controls-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .controls-row .left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .controls-row .right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        /* ── Buttons ── */
        .ctrl-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s ease;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            touch-action: manipulation;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .ctrl-btn svg {
            width: 22px;
            height: 22px;
            fill: #fff;
        }

        .ctrl-btn.play-btn svg {
            width: 26px;
            height: 26px;
        }

        /* ── Time Display ── */
        .time-display {
            color: #fff;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.3px;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        .time-display .separator {
            margin: 0 2px;
            opacity: 0.6;
        }

        /* ── Volume ── */
        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-wrap .vol-btn {
            font-size: 18px;
            width: 32px;
            height: 32px;
        }

        .volume-wrap .vol-btn svg {
            width: 20px;
            height: 20px;
        }

        .volume-slider {
            width: 0;
            overflow: hidden;
            transition: width 0.2s ease;
        }

        .volume-wrap:hover .volume-slider,
        .volume-wrap .volume-slider.open {
            width: 70px;
        }

        .volume-slider input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 4px;
            outline: none;
            transition: background 0.2s;
        }

        .volume-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: #ff0000;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .volume-slider input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            background: #ff0000;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        /* ── Fullscreen ── */
        .fullscreen-btn svg {
            width: 22px;
            height: 22px;
        }

        /* ── Center Play / Pause Button ── */
        .center-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 72px;
            height: 72px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 8;
            transition: opacity 0.25s ease, transform 0.2s ease, background 0.2s ease;
            opacity: 0;
            pointer-events: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            touch-action: manipulation;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .center-btn.show {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .center-btn:hover {
            background: rgba(0, 0, 0, 0.75);
            transform: translate(-50%, -50%) scale(1.05);
        }

        .center-btn:active {
            transform: translate(-50%, -50%) scale(0.92);
        }

        .center-btn svg {
            width: 36px;
            height: 36px;
            fill: #fff;
        }

        .center-btn .pause-icon {
            display: none;
        }
        .center-btn .play-icon {
            display: block;
            margin-left: 4px;
        }
        .center-btn.is-paused .pause-icon {
            display: none;
        }
        .center-btn.is-paused .play-icon {
            display: block;
        }
        .center-btn.is-playing .pause-icon {
            display: block;
        }
        .center-btn.is-playing .play-icon {
            display: none;
        }

        /* ── Loading Spinner ── */
        .spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 4;
            display: none;
            pointer-events: none;
        }

        .spinner.show {
            display: block;
        }

        .spinner svg {
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Double-tap Seek Flash (light, video.js style) ── */
        .seek-flash {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 42%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            z-index: 7;
            pointer-events: none;
            opacity: 0;
        }

        .seek-flash.left {
            left: 0;
        }

        .seek-flash.right {
            right: 0;
        }

        .seek-flash .circle {
            position: absolute;
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.14);
            transform: scale(0.4);
            opacity: 0;
        }

        .seek-flash .icon-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .seek-flash svg {
            width: 30px;
            height: 30px;
            fill: #fff;
            opacity: 0.95;
        }

        .seek-flash .seek-flash-label {
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.2px;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        }

        .seek-flash.show {
            animation: seekFlashFade 0.7s ease;
        }

        .seek-flash.show .circle {
            animation: seekCircleGrow 0.7s ease;
        }

        @keyframes seekFlashFade {
            0% {
                opacity: 0;
            }

            12% {
                opacity: 1;
            }

            65% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        @keyframes seekCircleGrow {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(1.35);
                opacity: 0;
            }
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .controls {
                padding: 12px 12px 10px 12px;
            }
            .controls-row {
                gap: 8px;
            }
            .ctrl-btn {
                width: 30px;
                height: 30px;
                font-size: 16px;
            }
            .ctrl-btn svg {
                width: 18px;
                height: 18px;
            }
            .ctrl-btn.play-btn svg {
                width: 22px;
                height: 22px;
            }
            .time-display {
                font-size: 11px;
            }
            .volume-wrap:hover .volume-slider {
                width: 50px;
            }
            .center-btn {
                width: 60px;
                height: 60px;
            }
            .center-btn svg {
                width: 28px;
                height: 28px;
            }
            .seek-flash .circle {
                width: 68px;
                height: 68px;
            }
            .seek-flash svg {
                width: 24px;
                height: 24px;
            }
            .seek-flash .seek-flash-label {
                font-size: 11px;
            }
        }

        @media (max-width: 420px) {
            .controls-row .left {
                gap: 4px;
            }
            .controls-row .right {
                gap: 6px;
            }
            .volume-wrap .vol-btn {
                width: 26px;
                height: 26px;
            }
            .volume-wrap .vol-btn svg {
                width: 16px;
                height: 16px;
            }
            .time-display {
                font-size: 10px;
            }
            .ctrl-btn {
                width: 26px;
                height: 26px;
            }
            .ctrl-btn svg {
                width: 16px;
                height: 16px;
            }
            .ctrl-btn.play-btn svg {
                width: 20px;
                height: 20px;
            }
            .center-btn {
                width: 52px;
                height: 52px;
            }
            .center-btn svg {
                width: 24px;
                height: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="player-wrapper">
        <div class="video-container" id="videoContainer">

            <!-- Video -->
            <video id="video" preload="metadata" playsinline>
                <source src="https://stream.mux.com/BV3YZtogl89mg9VcNBhhnHm02Y34zI1nlMuMQfAbl3dM/highest.mp4" type="video/mp4" />
                Your browser does not support the video tag.
            </video>

            <!-- Loading Spinner -->
            <div class="spinner" id="spinner">
                <svg viewBox="0 0 50 50" fill="none" stroke="#fff" stroke-width="4">
                    <circle cx="25" cy="25" r="20" stroke-opacity="0.25" />
                    <circle cx="25" cy="25" r="20" stroke="#ff0000" stroke-dasharray="80 200" stroke-linecap="round" />
                </svg>
            </div>

            <!-- Center Play / Pause Button -->
            <div class="center-btn is-paused show" id="centerBtn">
                <!-- Play icon (▶) -->
                <svg class="play-icon" viewBox="0 0 24 24">
                    <polygon points="5,3 19,12 5,21" />
                </svg>
                <!-- Pause icon (II) -->
                <svg class="pause-icon" viewBox="0 0 24 24">
                    <rect x="6" y="4" width="4" height="16" />
                    <rect x="14" y="4" width="4" height="16" />
                </svg>
            </div>

            <!-- Double-tap seek flashes -->
            <div class="seek-flash left" id="seekFlashLeft">
                <div class="circle"></div>
                <div class="icon-wrap">
                    <svg viewBox="0 0 24 24"><path d="M11.5,12L20,18V6L11.5,12z M4,12L12.5,18V6L4,12z" /></svg>
                </div>
                <div class="seek-flash-label"><span class="seek-flash-count">10</span> seconds</div>
            </div>
            <div class="seek-flash right" id="seekFlashRight">
                <div class="circle"></div>
                <div class="icon-wrap">
                    <svg viewBox="0 0 24 24"><path d="M12.5,12L4,6v12L12.5,12z M20,12L11.5,6v12L20,12z" /></svg>
                </div>
                <div class="seek-flash-label"><span class="seek-flash-count">10</span> seconds</div>
            </div>

            <!-- Controls -->
            <div class="controls" id="controls">

                <!-- Progress Bar -->
                <div class="progress-bar" id="progressBar">
                    <div class="buffered" id="buffered"></div>
                    <div class="filled" id="progressFilled"></div>
                </div>

                <!-- Controls Row -->
                <div class="controls-row">

                    <!-- Left -->
                    <div class="left">
                        <!-- Play / Pause (bottom bar) -->
                        <button class="ctrl-btn play-btn" id="playBtn" aria-label="Play / Pause">
                            <svg viewBox="0 0 24 24">
                                <polygon points="5,3 19,12 5,21" />
                            </svg>
                        </button>

                        <!-- Time -->
                        <span class="time-display">
                            <span id="currentTime">0:00</span>
                            <span class="separator">/</span>
                            <span id="duration">0:00</span>
                        </span>
                    </div>

                    <!-- Right -->
                    <div class="right">
                        <!-- Volume -->
                        <div class="volume-wrap">
                            <button class="ctrl-btn vol-btn" id="volBtn" aria-label="Mute / Unmute">
                                <svg viewBox="0 0 24 24">
                                    <path d="M3,9v6h4l5,5V4L7,9H3z" />
                                    <path d="M16.5,12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-0.73,2.5-2.25,2.5-4.02z" />
                                    <path d="M19.5,12c0-3.04-1.64-5.67-4-7.08v14.16c2.36-1.41,4-4.04,4-7.08z" />
                                </svg>
                            </button>
                            <div class="volume-slider" id="volSliderWrap">
                                <input type="range" id="volSlider" min="0" max="1" step="0.01" value="1" />
                            </div>
                        </div>

                        <!-- Fullscreen -->
                        <button class="ctrl-btn fullscreen-btn" id="fullscreenBtn" aria-label="Fullscreen">
                            <svg viewBox="0 0 24 24">
                                <path d="M7,14H5v5h5v-2H7V14z M5,10h2V7h3V5H5V10z M17,17h-3v2h5v-5h-2V17z M14,5v2h3v3h2V5H14z" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ── DOM refs ──
            const video = document.getElementById('video');
            const container = document.getElementById('videoContainer');
            const controls = document.getElementById('controls');
            const playBtn = document.getElementById('playBtn');
            const centerBtn = document.getElementById('centerBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFilled = document.getElementById('progressFilled');
            const bufferedEl = document.getElementById('buffered');
            const currentTimeEl = document.getElementById('currentTime');
            const durationEl = document.getElementById('duration');
            const volBtn = document.getElementById('volBtn');
            const volSlider = document.getElementById('volSlider');
            const volSliderWrap = document.getElementById('volSliderWrap');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const spinner = document.getElementById('spinner');
            const seekFlashLeft = document.getElementById('seekFlashLeft');
            const seekFlashRight = document.getElementById('seekFlashRight');

            // ── State ──
            let isMuted = false;
            let controlsTimeout = null;
            let isControlsVisible = true; // true initially since video starts paused
            let isDragging = false;
            let wasPlayingBeforeDrag = false;
            let clickTimer = null;
            let clickCount = 0;

            // Seek accumulation (so rapid double-double-clicks add up, like YouTube)
            const seekAccum = { left: 0, right: 0, leftTimeout: null, rightTimeout: null };

            // ── Helpers ──
            function formatTime(seconds) {
                if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
                const s = Math.floor(seconds);
                const m = Math.floor(s / 60);
                const secs = s % 60;
                return m + ':' + (secs < 10 ? '0' : '') + secs;
            }

            function togglePlay() {
                if (video.paused) {
                    video.play();
                } else {
                    video.pause();
                }
            }

            function updateCenterButton() {
                if (video.paused) {
                    centerBtn.classList.remove('is-playing');
                    centerBtn.classList.add('is-paused');
                } else {
                    centerBtn.classList.remove('is-paused');
                    centerBtn.classList.add('is-playing');
                }
            }

            function updatePlayIcon() {
                const svg = playBtn.querySelector('svg');
                if (video.paused) {
                    svg.innerHTML = '<polygon points="5,3 19,12 5,21" />';
                } else {
                    svg.innerHTML = '<rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" />';
                }
                updateCenterButton();
            }

            function updateVolumeIcon() {
                const svg = volBtn.querySelector('svg');
                if (isMuted || video.volume === 0) {
                    svg.innerHTML =
                        '<path d="M3,9v6h4l5,5V4L7,9H3z" /><path d="M19,11h-2v2h2V11z M19,7h-2v2h2V7z M19,15h-2v2h2V15z" />';
                } else if (video.volume < 0.5) {
                    svg.innerHTML =
                        '<path d="M3,9v6h4l5,5V4L7,9H3z" /><path d="M16.5,12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-0.73,2.5-2.25,2.5-4.02z" />';
                } else {
                    svg.innerHTML =
                        '<path d="M3,9v6h4l5,5V4L7,9H3z" /><path d="M16.5,12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-0.73,2.5-2.25,2.5-4.02z" /><path d="M19.5,12c0-3.04-1.64-5.67-4-7.08v14.16c2.36-1.41,4-4.04,4-7.08z" />';
                }
            }

            function updateProgress() {
                const percent = (video.currentTime / video.duration) * 100;
                progressFilled.style.width = percent + '%';
                currentTimeEl.textContent = formatTime(video.currentTime);
                durationEl.textContent = formatTime(video.duration);
            }

            function updateBuffered() {
                if (video.buffered.length > 0) {
                    const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                    const percent = (bufferedEnd / video.duration) * 100;
                    bufferedEl.style.width = percent + '%';
                }
            }

            // Show controls bar. If `persist` is true, no auto-hide timer is started
            // (used while paused, where controls should stay put).
            function showControls(persist) {
                container.classList.add('show-controls');
                isControlsVisible = true;
                clearTimeout(controlsTimeout);
                if (!persist) {
                    controlsTimeout = setTimeout(() => {
                        if (!video.paused && !video.ended) {
                            hideControls();
                        }
                    }, 3000);
                }
            }

            function hideControls() {
                container.classList.remove('show-controls');
                isControlsVisible = false;
                centerBtn.classList.remove('show');
                clearTimeout(controlsTimeout);
            }

            function showCenterBtn(show) {
                if (show) {
                    centerBtn.classList.add('show');
                } else {
                    centerBtn.classList.remove('show');
                }
            }

            // ── Double-tap seek flash (light, video.js style ripple) ──
            function showSeekFlash(direction, seconds) {
                const el = direction === 'left' ? seekFlashLeft : seekFlashRight;
                const countEl = el.querySelector('.seek-flash-count');
                const accumKey = direction;
                const timeoutKey = direction + 'Timeout';

                clearTimeout(seekAccum[timeoutKey]);
                seekAccum[accumKey] += seconds;
                countEl.textContent = seekAccum[accumKey];

                seekAccum[timeoutKey] = setTimeout(() => {
                    seekAccum[accumKey] = 0;
                }, 750);

                // Restart the CSS animation even if it's already running
                el.classList.remove('show');
                // force reflow so the animation restarts cleanly
                void el.offsetWidth;
                el.classList.add('show');
            }

            function seekVideoBy(seconds) {
                if (!video.duration || isNaN(video.duration)) return;
                const newTime = Math.max(0, Math.min(video.duration, video.currentTime + seconds));
                video.currentTime = newTime;
                updateProgress();
            }

            // ── Click handling for single vs double click ──
            function handleContainerClick(e) {
                // Ignore clicks on controls, center button, progress bar
                if (e.target.closest('.controls')) return;
                if (e.target.closest('.center-btn')) return;
                if (e.target.closest('.progress-bar')) return;

                // Get click position relative to container width
                const rect = container.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;

                // Track clicks for double-click detection
                clickCount++;
                if (clickCount === 1) {
                    clickTimer = setTimeout(() => {
                        clickCount = 0;
                        handleSingleClick(x);
                    }, 280);
                } else if (clickCount >= 2) {
                    clearTimeout(clickTimer);
                    clickCount = 0;
                    handleDoubleClick(x);
                }
            }

            function handleSingleClick(x) {
                // Paused: center button + controls should already be visible; nothing to toggle.
                if (video.paused || video.ended) {
                    showControls(true);
                    showCenterBtn(true);
                    updateCenterButton();
                    return;
                }

                // Playing: first tap reveals the center pause button + controls.
                // A second tap on empty space (while visible) hides everything again.
                if (isControlsVisible) {
                    hideControls();
                } else {
                    showControls(false);
                    showCenterBtn(true);
                    updateCenterButton();
                }
            }

            function handleDoubleClick(x) {
                // Left zone: rewind. Right zone: forward. Middle: ignored (no seek).
                if (x < 0.4) {
                    seekVideoBy(-10);
                    showSeekFlash('left', 10);
                } else if (x > 0.6) {
                    seekVideoBy(10);
                    showSeekFlash('right', 10);
                }
            }

            // ── Event Listeners ──

            container.addEventListener('click', handleContainerClick);

            // Touch support for double-tap
            let lastTouchTime = 0;
            container.addEventListener('touchend', (e) => {
                if (e.target.closest('.controls')) return;
                if (e.target.closest('.center-btn')) return;
                if (e.target.closest('.progress-bar')) return;

                const touch = e.changedTouches[0];
                const rect = container.getBoundingClientRect();
                const x = (touch.clientX - rect.left) / rect.width;

                const now = Date.now();
                const timeDiff = now - lastTouchTime;

                if (timeDiff < 300 && timeDiff > 20) {
                    // Double tap
                    lastTouchTime = 0;
                    handleDoubleClick(x);
                } else {
                    lastTouchTime = now;
                    setTimeout(() => {
                        if (lastTouchTime === now) {
                            lastTouchTime = 0;
                            handleSingleClick(x);
                        }
                    }, 300);
                }
            }, { passive: true });

            // ── Center button ──
            centerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                togglePlay();
            });

            centerBtn.addEventListener('touchstart', (e) => {
                e.stopPropagation();
            }, { passive: true });

            // ── Video events ──
            video.addEventListener('play', () => {
                updatePlayIcon();
                updateCenterButton();
                // While playing, show nothing but the video itself.
                hideControls();
            });

            video.addEventListener('pause', () => {
                updatePlayIcon();
                updateCenterButton();
                // While paused, keep the center play button and controls visible.
                showControls(true);
                showCenterBtn(true);
            });

            video.addEventListener('ended', () => {
                updatePlayIcon();
                updateCenterButton();
                showControls(true);
                showCenterBtn(true);
            });

            // Time updates
            video.addEventListener('timeupdate', () => {
                updateProgress();
                updateBuffered();
            });

            video.addEventListener('loadedmetadata', () => {
                durationEl.textContent = formatTime(video.duration);
                updateProgress();
                showControls(true);
                showCenterBtn(true);
            });

            video.addEventListener('progress', updateBuffered);

            // Loading spinner
            video.addEventListener('waiting', () => {
                spinner.classList.add('show');
            });
            video.addEventListener('canplay', () => {
                spinner.classList.remove('show');
            });
            video.addEventListener('playing', () => {
                spinner.classList.remove('show');
            });

            // ── Progress bar seeking (mouse) ──
            progressBar.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                isDragging = true;
                wasPlayingBeforeDrag = !video.paused;
                if (!video.paused) video.pause();
                const rect = progressBar.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;
                video.currentTime = x * video.duration;
                updateProgress();
                showControls(true);
                showCenterBtn(true);
                updateCenterButton();
            });

            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const rect = progressBar.getBoundingClientRect();
                    let x = (e.clientX - rect.left) / rect.width;
                    x = Math.max(0, Math.min(1, x));
                    video.currentTime = x * video.duration;
                    updateProgress();
                }
            });

            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    if (wasPlayingBeforeDrag) {
                        video.play();
                    } else {
                        showControls(true);
                        showCenterBtn(true);
                        updateCenterButton();
                    }
                }
            });

            // ── Progress bar seeking (touch) ──
            progressBar.addEventListener('touchstart', (e) => {
                e.preventDefault();
                e.stopPropagation();
                isDragging = true;
                wasPlayingBeforeDrag = !video.paused;
                if (!video.paused) video.pause();
                const rect = progressBar.getBoundingClientRect();
                const touch = e.touches[0];
                const x = (touch.clientX - rect.left) / rect.width;
                video.currentTime = x * video.duration;
                updateProgress();
                showControls(true);
                showCenterBtn(true);
                updateCenterButton();
            }, { passive: false });

            progressBar.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (isDragging) {
                    const rect = progressBar.getBoundingClientRect();
                    const touch = e.touches[0];
                    let x = (touch.clientX - rect.left) / rect.width;
                    x = Math.max(0, Math.min(1, x));
                    video.currentTime = x * video.duration;
                    updateProgress();
                }
            }, { passive: false });

            progressBar.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (isDragging) {
                    isDragging = false;
                    if (wasPlayingBeforeDrag) {
                        video.play();
                    } else {
                        showControls(true);
                        showCenterBtn(true);
                        updateCenterButton();
                    }
                }
            }, { passive: false });

            // ── Volume ──
            volBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (isMuted) {
                    video.muted = false;
                    isMuted = false;
                    volSlider.value = video.volume;
                } else {
                    video.muted = true;
                    isMuted = true;
                    volSlider.value = 0;
                }
                updateVolumeIcon();
            });

            volSlider.addEventListener('input', () => {
                const val = parseFloat(volSlider.value);
                video.volume = val;
                video.muted = (val === 0);
                isMuted = (val === 0);
                updateVolumeIcon();
            });

            video.addEventListener('volumechange', () => {
                volSlider.value = video.volume;
                isMuted = video.muted;
                updateVolumeIcon();
            });

            volBtn.addEventListener('mouseenter', () => {
                volSliderWrap.classList.add('open');
            });
            volSliderWrap.addEventListener('mouseleave', () => {
                volSliderWrap.classList.remove('open');
            });

            // ── Fullscreen ──
            fullscreenBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!document.fullscreenElement) {
                    container.requestFullscreen?.() ||
                        container.webkitRequestFullscreen?.() ||
                        container.msRequestFullscreen?.();
                } else {
                    document.exitFullscreen?.() ||
                        document.webkitExitFullscreen?.() ||
                        document.msExitFullscreen?.();
                }
            });

            document.addEventListener('fullscreenchange', updateFullscreenIcon);
            document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);
            document.addEventListener('msfullscreenchange', updateFullscreenIcon);

            function updateFullscreenIcon() {
                const isFull = !!document.fullscreenElement ||
                    !!document.webkitFullscreenElement ||
                    !!document.msFullscreenElement;
                const svg = fullscreenBtn.querySelector('svg');
                if (isFull) {
                    svg.innerHTML =
                        '<path d="M5,16h3v3h2v-5H5V16z M8,8H5v2h5V5H8V8z M16,19h2v-3h3v-2h-5V19z M19,8h-2V5h-2v5h4V8z" />';
                } else {
                    svg.innerHTML =
                        '<path d="M7,14H5v5h5v-2H7V14z M5,10h2V7h3V5H5V10z M17,17h-3v2h5v-5h-2V17z M14,5v2h3v3h2V5H14z" />';
                }
            }

            // ── Keyboard shortcuts ──
            document.addEventListener('keydown', (e) => {
                const tag = e.target.tagName;
                if (tag === 'INPUT') return;

                switch (e.key) {
                    case ' ':
                    case 'k':
                        e.preventDefault();
                        togglePlay();
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        seekVideoBy(10);
                        showSeekFlash('right', 10);
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        seekVideoBy(-10);
                        showSeekFlash('left', 10);
                        break;
                    case 'f':
                        fullscreenBtn.click();
                        break;
                    case 'm':
                        volBtn.click();
                        break;
                }
            });

            // ── Mouse movement to show controls while playing ──
            container.addEventListener('mousemove', () => {
                if (!video.paused && !video.ended && isControlsVisible) {
                    // Refresh the auto-hide timer while controls are visible and the
                    // mouse is moving, but don't force them to reappear from a hover.
                    showControls(false);
                }
            });

            container.addEventListener('mouseleave', () => {
                if (!video.paused && !video.ended) {
                    hideControls();
                }
            });

            // ── Init ──
            updatePlayIcon();
            updateVolumeIcon();
            updateProgress();

            // Video starts paused: center play button and controls are visible by default.
            showControls(true);
            showCenterBtn(true);

            // ── Handle visibility when tab changes ──
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    if (!video.paused && !video.ended) {
                        hideControls();
                    } else if (video.paused) {
                        showControls(true);
                        showCenterBtn(true);
                    }
                }
            });

        })();
    </script>

</body>
</html>
